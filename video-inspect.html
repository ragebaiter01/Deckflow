<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Inspect</title>
  <style>
    html, body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
    }
    body {
      display: grid;
      place-items: center;
      min-height: 100vh;
    }
    .wrap {
      width: 1280px;
      max-width: 100vw;
    }
    video {
      width: 100%;
      height: auto;
      display: block;
      background: black;
    }
    .meta {
      padding: 12px 0;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <video id="video" muted playsinline></video>
    <div class="meta" id="meta">Lade...</div>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const file = params.get("file");
    const time = Number(params.get("t") || "0");
    const video = document.getElementById("video");
    const meta = document.getElementById("meta");
    if (file) {
      video.src = file;
    }
    const done = () => {
      meta.textContent = `t=${time.toFixed(2)}s`;
      document.body.dataset.ready = "true";
    };
    video.addEventListener("loadedmetadata", () => {
      if (time > 0) {
        video.currentTime = Math.min(time, Math.max(0, video.duration - 0.1));
      } else {
        done();
      }
    });
    video.addEventListener("seeked", done);
    video.addEventListener("error", () => {
      meta.textContent = "Fehler beim Laden";
      document.body.dataset.ready = "error";
    });
  </script>
</body>
</html>
